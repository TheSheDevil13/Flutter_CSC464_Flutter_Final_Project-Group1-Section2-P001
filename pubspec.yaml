name: ai_language_app
description: AI Language Learning App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^2.27.1
  cloud_firestore: ^4.15.9

  # ── State Management ────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Networking (Groq/Gemini API) ───────────────────────────────────────────
  http: ^1.2.1

  # ── UI / Fonts ──────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # ── Utilities ───────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/